<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register Student — CampusQR</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link href="/css/main.css" rel="stylesheet" />
  </head>
  <body style="margin: 0; background: #f1f5f9">
    <section class="app-layout" id="app"></section>
    <script src="/js/app-shell.js"></script>
    <script>
      showAppLoading();
    </script>
    <script src="/js/api.js"></script>
    <script src="/js/scanner.js"></script>
    <script src="/js/sounds.js"></script>
    <script>
      (async () => {
        const user = await requireAuth(['admin']);
        if (!user) return;
        document.getElementById('app').innerHTML =
          buildSidebar('/admin/register.html', user) +
          `
        <main class="main-content">
          <h1>Register Student</h1>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
            <div class="card">
              <form id="reg-form" enctype="multipart/form-data">
                <div class="form-group"><label>Full Name *</label><input name="fullName" class="form-control" required></div>
                <div class="form-group"><label>Department *</label>
                  <select name="department" class="form-control" required>
                    <option>Computer Science</option><option>Electrical Engineering</option>
                    <option>Mechanical Engineering</option><option>Business</option>
                  </select>
                </div>
                <div class="form-group"><label>Batch *</label><input name="batch" class="form-control" placeholder="2024" required></div>
                <div class="form-group"><label>Email (optional login)</label><input name="email" type="email" class="form-control"></div>
                <div class="form-group"><label>Password</label><input name="password" type="password" class="form-control" placeholder="For student portal"></div>
                <div class="form-group"><label>Cafeteria Balance ($)</label><input name="cafeteriaBalance" type="number" step="0.01" class="form-control" value="100"></div>
                <div class="form-group"><label>Passport Photo</label><input name="photo" type="file" accept="image/*" class="form-control"></div>
                <button type="submit" class="btn btn-primary"><i class="bi bi-person-plus"></i> Register & Generate QR</button>
                <p id="msg" style="margin-top:1rem"></p>
              </form>
            </div>
            <div class="card" id="preview-card" style="display:none">
              <h3>Digital ID Preview</h3>
              <div id="id-preview"></div>
              <button type="button" class="btn btn-outline" style="margin-top:1rem" onclick="window.print()"><i class="bi bi-printer"></i> Print</button>
            </div>
          </div>
        </main>`;
        initLogout();

        document.getElementById('reg-form').addEventListener('submit', async (e) => {
          e.preventDefault();
          const msg = document.getElementById('msg');
          msg.textContent = 'Registering...';
          try {
            const fd = new FormData(e.target);
            const data = await StudentsAPI.register(fd);
            msg.innerHTML = `<span style="color:var(--success)">Registered! ID: <strong>${data.student.student_id}</strong></span>`;
            document.getElementById('preview-card').style.display = 'block';
            document.getElementById('id-preview').innerHTML = renderIdCard(
              data.student,
              data.qrDataUrl
            );
            SoundFX.success();
          } catch (ex) {
            msg.innerHTML = `<span style="color:var(--danger)">${ex.message}</span>`;
            SoundFX.error();
          }
        });
      })();
    </script>
  </body>
</html>
