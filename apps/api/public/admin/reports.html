<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reports — CampusQR</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link href="/css/main.css" rel="stylesheet" />
  </head>
  <body style="margin: 0; background: #f1f5f9">
    <section class="app-layout" id="app"></section>
    <script src="/js/app-shell.js"></script>
    <script>
      showAppLoading();
    </script>
    <script src="/js/api.js"></script>
    <script>
      (async () => {
        const user = await requireAuth(['admin', 'teacher']);
        if (!user) return;
        const today = new Date().toISOString().slice(0, 10);
        const courses = await AttendanceAPI.courses().catch(() => []);

        document.getElementById('app').innerHTML =
          buildSidebar('/admin/reports.html', user) +
          `
        <main class="main-content">
          <h1>Reports & Exports</h1>
          <div class="card">
            <h3>Attendance Reports</h3>
            <div style="display:flex;gap:1rem;flex-wrap:wrap;margin:1rem 0">
              <select id="course" class="form-control" style="max-width:200px">
                <option value="">All Courses</option>
                ${courses.map((c) => `<option value="${c.code}">${c.code} - ${c.name}</option>`).join('')}
              </select>
              <input type="date" id="date" class="form-control" style="max-width:180px" value="${today}">
              <button class="btn btn-success" id="excel-btn"><i class="bi bi-file-earmark-excel"></i> Export Excel</button>
              <button class="btn btn-danger" id="pdf-btn"><i class="bi bi-file-earmark-pdf"></i> Export PDF</button>
            </div>
          </div>
          <div class="card">
            <h3>Attendance Records</h3>
            <div class="table-wrap"><table><thead><tr>
              <th>Student ID</th><th>Name</th><th>Course</th><th>Date</th><th>Time</th><th>Status</th>
            </tr></thead><tbody id="att-body"></tbody></table></div>
          </div>
        </main>`;
        initLogout();

        async function loadAttendance() {
          const params = {};
          if (document.getElementById('course').value)
            params.course = document.getElementById('course').value;
          if (document.getElementById('date').value)
            params.date = document.getElementById('date').value;
          const rows = await AttendanceAPI.list(params);
          document.getElementById('att-body').innerHTML =
            rows
              .map(
                (r) => `
          <tr><td>${r.student_id}</td><td>${r.full_name}</td><td>${r.course}</td>
          <td>${r.attendance_date}</td><td>${r.attendance_time}</td>
          <td><span class="badge badge-success">${r.status}</span></td></tr>`
              )
              .join('') || '<tr><td colspan="6">No records</td></tr>';
        }

        function exportParams() {
          const p = {};
          if (document.getElementById('course').value)
            p.course = document.getElementById('course').value;
          if (document.getElementById('date').value) p.date = document.getElementById('date').value;
          return p;
        }

        document.getElementById('excel-btn').onclick = () =>
          ReportsAPI.attendanceExcel(exportParams());
        document.getElementById('pdf-btn').onclick = () => ReportsAPI.attendancePdf(exportParams());
        document.getElementById('course').onchange = loadAttendance;
        document.getElementById('date').onchange = loadAttendance;
        await loadAttendance();
      })();
    </script>
  </body>
</html>
