<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Students — CampusQR</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link href="/css/main.css" rel="stylesheet" />
  </head>
  <body style="margin: 0; background: #f1f5f9">
    <section class="app-layout" id="app"></section>
    <script src="/js/app-shell.js"></script>
    <script>
      showAppLoading();
    </script>
    <script src="/js/api.js"></script>
    <script>
      (async () => {
        const user = await requireAuth(['admin']);
        if (!user) return;
        document.getElementById('app').innerHTML =
          buildSidebar('/admin/students.html', user) +
          `
        <main class="main-content">
          <div class="top-bar">
            <h1>Students</h1>
            <a href="/admin/register.html" class="btn btn-primary"><i class="bi bi-person-plus"></i> Register</a>
          </div>
          <div class="card">
            <div class="card-header">
              <input type="search" id="search" class="form-control" style="max-width:300px" placeholder="Search students...">
            </div>
            <div class="table-wrap">
              <table><thead><tr>
                <th>Photo</th><th>ID</th><th>Name</th><th>Department</th><th>Batch</th><th>Status</th><th>Actions</th>
              </tr></thead><tbody id="tbody"></tbody></table>
            </div>
          </div>
        </main>`;
        initLogout();

        async function load(q = '') {
          const students = await StudentsAPI.list(q ? { search: q } : {});
          document.getElementById('tbody').innerHTML = students
            .map(
              (s) => `
          <tr>
            <td>${s.photo_url ? `<img src="${s.photo_url}" style="width:40px;height:50px;object-fit:cover;border-radius:4px">` : '<i class="bi bi-person" style="font-size:1.5rem"></i>'}</td>
            <td><strong>${s.student_id}</strong></td>
            <td>${s.full_name}</td>
            <td>${s.department}</td>
            <td>${s.batch}</td>
            <td><span class="badge badge-${s.status === 'active' ? 'success' : 'danger'}">${s.status}</span></td>
            <td>
              <a href="/student/id-card.html?id=${s.student_id}" class="btn btn-sm btn-outline" target="_blank">ID Card</a>
            </td>
          </tr>
        `
            )
            .join('');
        }
        document.getElementById('search').addEventListener('input', (e) => load(e.target.value));
        await load();
      })();
    </script>
  </body>
</html>
