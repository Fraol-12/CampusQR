<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CampusQR — Login</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link href="/css/main.css" rel="stylesheet" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, sans-serif;
      }
      .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1e3a5f 0%, #0c4a6e 50%, #0ea5e9 100%);
        padding: 2rem;
      }
      .login-card {
        background: #fff;
        border-radius: 16px;
        padding: 2.5rem;
        max-width: 420px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="login-page">
      <div class="login-card">
        <h1><i class="bi bi-qr-code-scan"></i> CampusQR</h1>
        <p class="subtitle">Smart QR Campus Management System</p>
        <form id="login-form">
          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              class="form-control"
              required
              placeholder="admin@university.edu"
            />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              class="form-control"
              required
              placeholder="••••••••"
            />
          </div>
          <button
            type="submit"
            class="btn btn-primary"
            style="width: 100%; justify-content: center; padding: 0.75rem"
          >
            <i class="bi bi-box-arrow-in-right"></i> Sign In
          </button>
          <p
            id="login-error"
            style="color: var(--danger); font-size: 0.85rem; margin-top: 1rem; display: none"
          ></p>
        </form>
        <div class="role-hint">
          <strong>Demo accounts</strong><br />
          admin@university.edu / admin123<br />
          security@university.edu / security123<br />
          cafeteria@university.edu / cafe123<br />
          teacher@university.edu / teacher123<br />
          librarian@university.edu / library123<br />
          alex.j@student.edu / student123
        </div>
      </div>
    </div>
    <script src="/js/api.js"></script>
    <script src="/js/sounds.js"></script>
    <script>
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const err = document.getElementById('login-error');
        err.style.display = 'none';
        try {
          const data = await AuthAPI.login(
            document.getElementById('email').value,
            document.getElementById('password').value
          );
          setToken(data.token);
          SoundFX.success();
          redirectByRole(data.user.role);
        } catch (ex) {
          err.textContent = ex.message;
          err.style.display = 'block';
          SoundFX.error();
        }
      });
      if (getToken()) {
        AuthAPI.me()
          .then((u) => redirectByRole(u.role))
          .catch(() => setToken(null));
      }
    </script>
  </body>
</html>
