<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cafeteria Scanner — CampusQR</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link href="/css/main.css" rel="stylesheet" />
  </head>
  <body style="margin: 0; background: #f1f5f9">
    <section class="app-layout" id="app"></section>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="/js/app-shell.js"></script>
    <script>
      showAppLoading();
    </script>
    <script src="/js/api.js"></script>
    <script src="/js/scanner.js"></script>
    <script src="/js/sounds.js"></script>
    <script>
      (async () => {
        const user = await requireAuth(['admin', 'cafeteria']);
        if (!user) return;
        document.getElementById('app').innerHTML =
          buildSidebar('/scanner/cafeteria.html', user) +
          `
        <main class="main-content">
          <h1><i class="bi bi-cup-hot"></i> Cafeteria Scanner</h1>
          <div class="card" style="margin-bottom:1rem">
            <label>Meal Amount ($)</label>
            <input type="number" id="amount" class="form-control" style="max-width:150px" value="5" step="0.5" min="0">
          </div>
          <div class="scanner-layout">
            <div class="card"><div id="qr-reader"></div></div>
            <div id="scan-result" class="scan-result idle">
              <h2>Scan Student QR</h2>
              <p style="color:var(--muted)">Verify identity before payment</p>
            </div>
          </div>
        </main>`;
        initLogout();

        const resultEl = document.getElementById('scan-result');
        const scanner = new QrScanner('qr-reader', async (qrData) => {
          const amount = parseFloat(document.getElementById('amount').value) || 0;
          try {
            const result = await ScansAPI.cafeteria(qrData, amount);
            renderScanResult(resultEl, result);
          } catch (ex) {
            renderScanResult(resultEl, { display: 'unauthorized', message: ex.message });
          }
        });
        try {
          await scanner.start();
        } catch (e) {
          resultEl.innerHTML = `<p style="color:var(--danger)">Camera: ${e.message}</p>`;
        }
      })();
    </script>
  </body>
</html>
