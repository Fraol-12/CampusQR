<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gate Scanner — CampusQR</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link href="/css/main.css" rel="stylesheet" />
  </head>
  <body style="margin: 0; background: #f1f5f9">
    <section class="app-layout" id="app"></section>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="/js/app-shell.js"></script>
    <script>
      showAppLoading();
    </script>
    <script src="/js/api.js"></script>
    <script src="/js/scanner.js"></script>
    <script src="/js/sounds.js"></script>
    <script>
      (async () => {
        const user = await requireAuth(['admin', 'security']);
        if (!user) return;
        document.getElementById('app').innerHTML =
          buildSidebar('/scanner/gate.html', user) +
          `
        <main class="main-content">
          <div class="top-bar">
            <h1><i class="bi bi-door-open"></i> Campus Entry Scanner</h1>
            <button class="btn btn-outline" id="reset-btn"><i class="bi bi-arrow-clockwise"></i> Reset</button>
          </div>
          <div class="scanner-layout">
            <div class="card"><div id="qr-reader"></div></div>
            <div id="scan-result" class="scan-result idle">
              <p class="result-icon" style="color:var(--muted);font-size:5rem"><i class="bi bi-qr-code-scan"></i></p>
              <h2>Ready to Scan</h2>
              <p style="color:var(--muted)">Point camera at student QR code</p>
            </div>
          </div>
        </main>`;
        initLogout();

        const resultEl = document.getElementById('scan-result');
        const scanner = new QrScanner('qr-reader', async (qrData) => {
          try {
            const result = await ScansAPI.entry(qrData);
            renderScanResult(resultEl, result);
          } catch (ex) {
            renderScanResult(resultEl, { display: 'unauthorized', message: ex.message });
          }
        });

        try {
          await scanner.start();
        } catch (e) {
          resultEl.innerHTML = `<p style="color:var(--danger)">Camera error: ${e.message}. Allow camera access.</p>`;
        }

        document.getElementById('reset-btn').onclick = () => {
          scanner.resetCooldown();
          resultEl.className = 'scan-result idle';
          resultEl.innerHTML =
            '<p style="font-size:5rem;color:var(--muted)"><i class="bi bi-qr-code-scan"></i></p><h2>Ready to Scan</h2>';
        };
      })();
    </script>
  </body>
</html>
