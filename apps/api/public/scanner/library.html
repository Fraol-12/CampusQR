<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Library Scanner — CampusQR</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
      rel="stylesheet"
    />
    <link href="/css/main.css" rel="stylesheet" />
  </head>
  <body style="margin: 0; background: #f1f5f9">
    <section class="app-layout" id="app"></section>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="/js/app-shell.js"></script>
    <script>
      showAppLoading();
    </script>
    <script src="/js/api.js"></script>
    <script src="/js/scanner.js"></script>
    <script src="/js/sounds.js"></script>
    <script>
      (async () => {
        const user = await requireAuth(['admin', 'librarian']);
        if (!user) return;
        let currentStudent = null;

        document.getElementById('app').innerHTML =
          buildSidebar('/scanner/library.html', user) +
          `
        <main class="main-content">
          <h1><i class="bi bi-book"></i> Library System</h1>
          <div class="scanner-layout">
            <div class="card"><div id="qr-reader"></div></div>
            <div>
              <div id="scan-result" class="scan-result idle"><h2>Scan to verify</h2></div>
              <div class="card" id="actions" style="display:none;margin-top:1rem">
                <h3>Book Operations</h3>
                <div class="form-group"><label>Book Title</label><input id="book-name" class="form-control"></div>
                <div class="form-group"><label>ISBN (optional)</label><input id="isbn" class="form-control"></div>
                <button class="btn btn-primary" id="borrow-btn"><i class="bi bi-book"></i> Borrow</button>
                <h4 style="margin-top:1.5rem">Borrowed Books</h4>
                <ul id="borrowed-list"></ul>
              </div>
            </div>
          </div>
        </main>`;
        initLogout();

        const resultEl = document.getElementById('scan-result');
        const scanner = new QrScanner('qr-reader', async (qrData) => {
          try {
            const result = await LibraryAPI.verify(qrData);
            renderScanResult(resultEl, result);
            if (result.success) {
              currentStudent = result.student;
              document.getElementById('actions').style.display = 'block';
              const list = document.getElementById('borrowed-list');
              list.innerHTML =
                (result.borrowedBooks || [])
                  .map(
                    (b) => `
              <li>${b.book_name} — due ${b.due_date}
                <button class="btn btn-sm btn-success" data-id="${b.id}">Return</button></li>`
                  )
                  .join('') || '<li>No active loans</li>';
              list.querySelectorAll('button').forEach((btn) => {
                btn.onclick = async () => {
                  await LibraryAPI.returnBook(btn.dataset.id);
                  scanner.resetCooldown();
                  LibraryAPI.verify(qrData).then((r) => btn.closest('li').remove());
                };
              });
            }
          } catch (ex) {
            renderScanResult(resultEl, { display: 'unauthorized', message: ex.message });
          }
        });

        document.getElementById('borrow-btn').onclick = async () => {
          if (!currentStudent) return;
          const bookName = document.getElementById('book-name').value;
          if (!bookName) return alert('Enter book title');
          await LibraryAPI.borrow({
            studentId: currentStudent.student_id,
            bookName,
            isbn: document.getElementById('isbn').value,
          });
          document.getElementById('book-name').value = '';
          SoundFX.success();
          alert('Book borrowed successfully');
        };

        try {
          await scanner.start();
        } catch (e) {
          resultEl.innerHTML = `<p>${e.message}</p>`;
        }
      })();
    </script>
  </body>
</html>
