services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file:
      - apps/api/.env
    ports:
      - '3000:3000'
    volumes:
      - api-data:/app/apps/api/data
      - api-uploads:/app/apps/api/uploads
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 10s
      timeout: 5s
      retries: 5

